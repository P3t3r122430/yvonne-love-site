<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yvonne ❤️</title>

  <!-- Soft aesthetic fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Quicksand:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
      color: #fff;
      font-family: 'Quicksand', sans-serif;
      background: #000;
    }

    /* Background */
    .background-img {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    /* Overlay */
    .overlay {
      background: rgba(0,0,0,0.45);
      padding: 25px 35px;
      border-radius: 15px;
      backdrop-filter: blur(6px);
      z-index: 2;
    }

    h1 {
      font-family: 'Parisienne', cursive;
      font-size: 75px;
      margin-bottom: 10px;
    }

    #static-message {
      font-family: 'Parisienne', cursive;
      font-size: 32px;
      margin-bottom: 10px;
    }

    #changing-message {
      font-size: 26px;
      min-height: 70px;
    }

    /* Cursor */
    .cursor {
      display: inline-block;
      width: 2px;
      background: #fff;
      animation: blink 0.8s infinite;
      margin-left: 3px;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    /* Hearts */
    .hearts {
      position: fixed;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .heart {
      position: absolute;
      color: #ff3366;
      animation: floatUp 4s linear forwards;
    }

    @keyframes floatUp {
      from {
        transform: translateY(100vh);
        opacity: 1;
      }
      to {
        transform: translateY(-10vh);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <!-- Background -->
  <img src="yvonne.jpg" class="background-img" alt="Yvonne">

  <div class="overlay">
    <h1>Yvonne ❤️</h1>
    <p id="static-message">There’s just something about you 💭</p>
    <p id="changing-message"></p>
  </div>

  <div class="hearts"></div>

  <script>
    const messages = [
      // calm opening
      "Some people just carry a certain calm about them 🌿",
      "It’s the way you show up… quietly noticeable ✨",
      "You don’t try to be seen, but you still are 👀",

      // curiosity phase
      "There’s something about your presence that lingers 💭",
      "Hard to explain… but it stays in the mind 🌙",
      "You feel different without trying to be different 🌸",

      // depth phase
      "Not everything needs words to be understood 🤍",
      "Some energy just fits without reason 🌊",
      "You leave impressions that don’t fade quickly 💎",

      // reflection phase
      "It’s strange how certain people stay in thought longer than expected 😌",
      "You feel like one of those rare, quiet constants 🌿",
      "Even silence feels different around the right kind of presence ✨",

      // closing impact
      "Some things aren’t loud… they’re just real 🌹",
      "Yeah… you’re one of those"
    ];

    let index = 0;
    const messageEl = document.getElementById("changing-message");

    function showMessage() {
      const text = messages[index];
      let charIndex = 0;

      messageEl.innerHTML = "";

      function type() {
        if (charIndex < text.length) {
          messageEl.innerHTML =
            text.substring(0, charIndex + 1) +
            "<span class='cursor'></span>";
          charIndex++;
          setTimeout(type, 45);
        }
      }

      type();

      let delay = 6000;

      if (index >= 3 && index < 8) delay = 7000;
      if (index >= 8) delay = 8000;

      index = (index + 1) % messages.length;

      setTimeout(showMessage, delay);
    }

    showMessage();

    // hearts
    function createHeart() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerHTML = "❤";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = (Math.random() * 20 + 12) + "px";
      document.querySelector(".hearts").appendChild(heart);

      setTimeout(() => heart.remove(), 4000);
    }

    setInterval(createHeart, 700);
  </script>

</body>
</html>
