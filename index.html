<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoidCipher</title>

  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;
      overflow:hidden;
      background:#000;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family:'Share Tech Mono', monospace;
      color:#00ffcc;
      position:relative;
    }

    /* background glow */
    .glow{
      position:absolute;
      width:600px;
      height:600px;
      background:radial-gradient(circle, rgba(0,255,200,0.12), transparent 70%);
      filter:blur(40px);
      z-index:0;
      animation:pulseGlow 5s infinite ease-in-out;
    }

    @keyframes pulseGlow{
      0%,100%{
        transform:scale(1);
        opacity:0.6;
      }
      50%{
        transform:scale(1.15);
        opacity:1;
      }
    }

    /* scanlines */
    .scanlines{
      position:absolute;
      inset:0;
      background:
      repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 3px
      );
      pointer-events:none;
      z-index:3;
    }

    /* particles */
    .particles span{
      position:absolute;
      width:2px;
      height:2px;
      background:#00ffcc;
      border-radius:50%;
      opacity:0.4;
      animation:float 12s linear infinite;
    }

    @keyframes float{
      from{
        transform:translateY(100vh);
      }
      to{
        transform:translateY(-10vh);
      }
    }

    .container{
      text-align:center;
      max-width:950px;
      padding:30px;
      position:relative;
      z-index:5;
      animation:fadeIn 2s ease;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(15px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .glitch{
      font-size:22px;
      line-height:1.8;
      position:relative;

      text-shadow:
      0 0 5px rgba(0,255,200,0.5),
      0 0 20px rgba(0,255,200,0.25);

      animation:flicker 4s infinite;
    }

    .glitch::before,
    .glitch::after{
      content:attr(data-text);
      position:absolute;
      left:0;
      width:100%;
      overflow:hidden;
      opacity:0.35;
    }

    .glitch::before{
      color:#ff0055;
      transform:translate(-1px);
      animation:glitchA 3s infinite linear alternate-reverse;
    }

    .glitch::after{
      color:#00aaff;
      transform:translate(1px);
      animation:glitchB 2s infinite linear alternate-reverse;
    }

    @keyframes glitchA{
      0%{clip-path: inset(0 0 80% 0);}
      50%{clip-path: inset(30% 0 40% 0);}
      100%{clip-path: inset(70% 0 10% 0);}
    }

    @keyframes glitchB{
      0%{clip-path: inset(75% 0 5% 0);}
      50%{clip-path: inset(15% 0 55% 0);}
      100%{clip-path: inset(0 0 90% 0);}
    }

    @keyframes flicker{
      0%,100%{
        opacity:1;
      }
      50%{
        opacity:0.82;
      }
    }

    .cursor{
      display:inline-block;
      width:10px;
      animation:blink 0.8s infinite;
    }

    @keyframes blink{
      50%{
        opacity:0;
      }
    }

    .tag{
      margin-top:20px;
      font-size:11px;
      letter-spacing:4px;
      opacity:0.5;
    }

    .bottom-code{
      position:absolute;
      bottom:40px;
      width:100%;
      text-align:center;
      font-size:18px;
      letter-spacing:6px;
      opacity:0.65;

      text-shadow:
      0 0 10px rgba(0,255,200,0.35);

      z-index:5;
    }

  </style>
</head>

<body>

  <div class="glow"></div>

  <div class="particles">
    <span style="left:10%; animation-duration:10s;"></span>
    <span style="left:20%; animation-duration:14s;"></span>
    <span style="left:35%; animation-duration:11s;"></span>
    <span style="left:50%; animation-duration:13s;"></span>
    <span style="left:65%; animation-duration:9s;"></span>
    <span style="left:80%; animation-duration:15s;"></span>
    <span style="left:90%; animation-duration:12s;"></span>
  </div>

  <div class="scanlines"></div>

  <div class="container">

    <div class="glitch"
      data-text=":::::::::>... Parents are only strict when they know their product is attractive">

      :::::::::>... Parents are only strict when they know their product is attractive<span class="cursor">_</span>

    </div>

    <div class="tag">
      // encrypted signal stable //
    </div>

  </div>

  <div class="bottom-code">
    %@**#& #^*!+
  </div>

</body>
</html>
