<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Yvonne</title>

  <!-- Elegant feminine + clean font combo -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: 'Montserrat', sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* background */
    .bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.55);
      z-index: -1;
    }

    /* main container */
    .card {
      width: 100%;
      max-width: 750px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 70px;
      margin-bottom: 5px;
    }

    .subtitle {
      font-size: 16px;
      opacity: 0.75;
      margin-bottom: 20px;
    }

    /* message */
    #msg {
      font-size: 22px;
      min-height: 80px;
      line-height: 1.6;
      margin-bottom: 25px;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      background: #fff;
      animation: blink 0.8s infinite;
      margin-left: 3px;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    /* gallery (5 images styled properly) */
    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 10px;
    }

    .gallery img {
      width: 100%;
      height: 130px;
      object-fit: cover;
      border-radius: 14px;
      transition: 0.3s ease;
      opacity: 0.88;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    .gallery img:hover {
      transform: scale(1.05);
      opacity: 1;
    }

    /* mobile */
    @media (max-width: 600px) {
      .gallery {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

<body>

  <!-- background image -->
  <img src="img1.jpg" class="bg" alt="background">

  <div class="card">
    <h1>Yvonne</h1>
    <div class="subtitle">soft thoughts, quiet feelings</div>

    <div id="msg"></div>

    <!-- 5 images -->
    <div class="gallery">
      <img src="img1.jpg">
      <img src="img2.jpg">
      <img src="img3.jpg">
      <img src="img4.jpg">
      <img src="img5.jpg">
    </div>
  </div>

  <script>
    const messages = [
      "Some presence doesn’t need attention to be felt.",
      "You feel like calm that stays without effort.",
      "Not loud, not forced… just naturally noticeable.",
      "Some people become a feeling, not just a memory.",
      "You don’t try to stand out, yet you do.",
      "There’s something quietly different about you.",
      "It’s not easy to explain… but it’s easy to feel.",
      "And somehow… you stay in thought longer than expected.",
      "Yeah… you’re one of those."
    ];

    let i = 0;
    const el = document.getElementById("msg");

    function type(text, index = 0) {
      if (index === 0) el.innerHTML = "";

      if (index < text.length) {
        el.innerHTML = text.substring(0, index + 1) + "<span class='cursor'></span>";
        setTimeout(() => type(text, index + 1), 45);
      }
    }

    function loop() {
      type(messages[i]);

      i = (i + 1) % messages.length;

      let delay = 6000;
      if (i > 3) delay = 7000;

      setTimeout(loop, delay);
    }

    loop();
  </script>

</body>
</html>
