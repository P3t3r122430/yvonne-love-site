<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Yvonne ❤️</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Quicksand:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Quicksand', sans-serif;
      color: #fff;
      background: #000;
      overflow-x: hidden;
    }

    /* Background image */
    .background-img {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
      filter: brightness(0.7);
    }

    /* Main card */
    .overlay {
      width: 92%;
      max-width: 700px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(10px);
      padding: 35px;
      border-radius: 18px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      text-align: center;
    }

    h1 {
      font-family: 'Parisienne', cursive;
      font-size: 70px;
      margin-bottom: 10px;
    }

    #static-message {
      font-family: 'Parisienne', cursive;
      font-size: 28px;
      margin-bottom: 15px;
      opacity: 0.9;
    }

    #changing-message {
      font-size: 22px;
      min-height: 80px;
      line-height: 1.6;
      margin-bottom: 25px;
    }

    /* Cursor */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 18px;
      background: #fff;
      margin-left: 4px;
      animation: blink 0.8s infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    /* Gallery */
    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 10px;
    }

    .gallery img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 12px;
      transition: 0.3s ease;
      opacity: 0.9;
    }

    .gallery img:hover {
      transform: scale(1.05);
      opacity: 1;
    }

    /* Mobile */
    @media (max-width: 600px) {
      .gallery {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

<body>

  <!-- Background -->
  <img src="img1.jpg" class="background-img" alt="background">

  <div class="overlay">
    <h1>Yvonne ❤️</h1>
    <div id="static-message">There’s just something about you</div>
    <div id="changing-message"></div>

    <!-- Gallery -->
    <div class="gallery">
      <img src="img1.jpg" alt="">
      <img src="img2.jpg" alt="">
      <img src="img3.jpg" alt="">
      <img src="img4.jpg" alt="">
      <img src="img5.jpg" alt="">
    </div>
  </div>

  <script>
    const messages = [
      "Some people don’t try… yet still stand out.",
      "You feel like calm in a noisy world.",
      "There’s something about your presence that stays.",
      "Not loud, not forced… just naturally noticeable.",
      "You don’t need attention. You already have it.",
      "Some energy is hard to explain, but easy to feel.",
      "You leave a quiet impression without trying.",
      "It’s strange how some people stay in thought.",
      "You feel like a soft kind of rare.",
      "Nothing exaggerated… just real presence.",
      "Yeah… you’re one of those."
    ];

    let index = 0;
    const el = document.getElementById("changing-message");

    function type(text, i = 0) {
      if (i === 0) el.innerHTML = "";

      if (i < text.length) {
        el.innerHTML = text.substring(0, i + 1) + "<span class='cursor'></span>";
        setTimeout(() => type(text, i + 1), 45);
      }
    }

    function nextMessage() {
      type(messages[index]);

      index = (index + 1) % messages.length;

      let delay = 6000;
      if (index > 3) delay = 7000;
      if (index > 7) delay = 8000;

      setTimeout(nextMessage, delay);
    }

    nextMessage();
  </script>

</body>
</html>
