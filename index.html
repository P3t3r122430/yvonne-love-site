<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Yvonne</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: 'Montserrat', sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow: hidden;
    }

    /* background image */
    .bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.55);
      z-index: -3;
    }

    /* FLOATING HEARTS LAYER */
    .hearts {
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
    }

    .heart {
      position: absolute;
      color: rgba(255, 80, 120, 0.7);
      animation: floatUp 6s linear forwards;
      font-size: 16px;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(100vh) scale(1);
        opacity: 0;
      }
      20% {
        opacity: 0.8;
      }
      100% {
        transform: translateY(-10vh) scale(0.4);
        opacity: 0;
      }
    }

    /* MAIN CARD */
    .card {
      width: 100%;
      max-width: 750px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 35px;

      display: flex;
      flex-direction: column;
      gap: 20px;

      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
      z-index: 2;
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 70px;
    }

    .subtitle {
      font-size: 16px;
      opacity: 0.75;
    }

    #msg {
      font-size: 22px;
      min-height: 80px;
      line-height: 1.6;
      position: relative;
      z-index: 2;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      background: #fff;
      animation: blink 0.8s infinite;
      margin-left: 3px;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    /* SLIDESHOW */
    .ig-gallery {
      max-width: 500px;
      margin: auto;
      position: relative;
      z-index: 1;
    }

    .ig-gallery img {
      width: 100%;
      height: 240px;
      object-fit: cover;
      border-radius: 16px;
      box-shadow: 0 12px 35px rgba(0,0,0,0.6);
      transition: opacity 0.5s ease;
    }

    .ig-dots {
      display: flex;
      justify-content: center;
      margin-top: 10px;
      gap: 6px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
    }

    .dot.active {
      background: #fff;
      transform: scale(1.2);
    }

  </style>
</head>

<body>

  <img src="img1.jpg" class="bg" alt="background">

  <!-- hearts layer -->
  <div class="hearts"></div>

  <div class="card">
    <h1>Yvonne</h1>
    <div class="subtitle">soft thoughts, quiet presence</div>

    <div id="msg"></div>

    <div class="ig-gallery">
      <img id="ig-slide" src="img1.jpg" alt="gallery">

      <div class="ig-dots">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </div>
  </div>

  <script>
    /* TEXT */
    const messages = [
      "Some people don’t arrive loudly… they just stay in memory.",
      "You feel like calm that doesn’t need explanation.",
      "Nothing forced, nothing loud… just naturally noticeable.",
      "Some people become a feeling, not just a memory.",
      "You don’t try to stand out, yet you do.",
      "There’s something quietly different about you.",
      "It’s not easy to explain… but it’s easy to feel.",
      "And somehow… you stay in thought longer than expected.",
      "Yeah… you’re one of those."
    ];

    let i = 0;
    const el = document.getElementById("msg");

    function type(text, index = 0) {
      if (index === 0) el.innerHTML = "";

      if (index < text.length) {
        el.innerHTML =
          text.substring(0, index + 1) +
          "<span class='cursor'></span>";
        setTimeout(() => type(text, index + 1), 45);
      }
    }

    function loop() {
      type(messages[i]);
      i = (i + 1) % messages.length;
      setTimeout(loop, 6500);
    }

    loop();

    /* SLIDESHOW */
    const images = ["img1.jpg","img2.jpg","img3.jpg","img4.jpg","img5.jpg"];

    let current = 0;
    const imgEl = document.getElementById("ig-slide");
    const dots = document.querySelectorAll(".dot");

    function updateSlide(index) {
      imgEl.style.opacity = 0;

      setTimeout(() => {
        imgEl.src = images[index];
        imgEl.style.opacity = 1;
      }, 300);

      dots.forEach(d => d.classList.remove("active"));
      dots[index].classList.add("active");
    }

    function nextSlide() {
      current = (current + 1) % images.length;
      updateSlide(current);
    }

    setInterval(nextSlide, 3500);

    /* HEARTS */
    function createHeart() {
      const heart = document.createElement("div");
      heart.classList.add("heart");

      heart.innerHTML = "❤";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = (Math.random() * 18 + 10) + "px";

      document.querySelector(".hearts").appendChild(heart);

      setTimeout(() => heart.remove(), 6000);
    }

    setInterval(createHeart, 500);
  </script>

</body>
</html>
