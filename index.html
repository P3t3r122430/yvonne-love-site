<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yvonne ❤️</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Quicksand:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow-x: hidden;
      color: #fff;
      font-family: 'Quicksand', sans-serif;
      background: #000;
    }

    /* Background */
    .background-img {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    /* Main card */
    .overlay {
      background: rgba(0, 0, 0, 0.55);
      padding: 35px 45px;
      border-radius: 18px;
      backdrop-filter: blur(10px);
      max-width: 650px;
      width: 90%;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    }

    h1 {
      font-family: 'Parisienne', cursive;
      font-size: 75px;
      margin-bottom: 10px;
    }

    #static-message {
      font-family: 'Parisienne', cursive;
      font-size: 30px;
      margin-bottom: 15px;
    }

    #changing-message {
      font-size: 24px;
      min-height: 80px;
      line-height: 1.6;
    }

    /* Cursor */
    .cursor {
      display: inline-block;
      width: 2px;
      background: #fff;
      animation: blink 0.8s infinite;
      margin-left: 3px;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    /* Gallery */
    .gallery {
      margin-top: 25px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      max-width: 520px;
      margin-left: auto;
      margin-right: auto;
    }

    .gallery img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 12px;
      opacity: 0.85;
      transition: 0.3s ease;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }

    .gallery img:hover {
      transform: scale(1.05);
      opacity: 1;
    }

    /* Mobile */
    @media (max-width: 600px) {
      .gallery {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

<body>

  <!-- Background -->
  <img src="yvonne.jpg" class="background-img" alt="Yvonne">

  <div class="overlay">
    <h1>Yvonne ❤️</h1>
    <p id="static-message">There’s just something about you 💭</p>
    <p id="changing-message"></p>

    <!-- Gallery -->
    <div class="gallery">
      <img src="img1.jpg">
      <img src="img2.jpg">
      <img src="img3.jpg">
      <img src="img4.jpg">
      <img src="img5.jpg">
    </div>
  </div>

  <script>
    const messages = [
      "Some people just carry a certain calm about them 🌿",
      "It’s the way you show up… quietly noticeable ✨",
      "You don’t try to be seen, but you still are 👀",
      "There’s something about your presence that lingers 💭",
      "Hard to explain… but it stays in the mind 🌙",
      "You feel different without trying to be different 🌸",
      "Not everything needs words to be understood 🤍",
      "Some energy just fits without reason 🌊",
      "You leave impressions that don’t fade quickly 💎",
      "You feel like one of those rare, quiet constants 🌿",
      "Even silence feels different around the right presence ✨",
      "Some things aren’t loud… they’re just real 🌹",
      "Yeah… you’re one of those"
    ];

    let index = 0;
    const messageEl = document.getElementById("changing-message");

    function showMessage() {
      const text = messages[index];
      let charIndex = 0;

      messageEl.innerHTML = "";

      function type() {
        if (charIndex < text.length) {
          messageEl.innerHTML =
            text.substring(0, charIndex + 1) +
            "<span class='cursor'></span>";
          charIndex++;
          setTimeout(type, 45);
        }
      }

      type();

      let delay = 6000;
      if (index >= 3 && index < 8) delay = 7000;
      if (index >= 8) delay = 8000;

      index = (index + 1) % messages.length;

      setTimeout(showMessage, delay);
    }

    showMessage();
  </script>

</body>
</html>
