<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoidCipher</title>

  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;
      overflow:hidden;
      background:#000;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family:'Share Tech Mono', monospace;
      color:#00ffcc;
      position:relative;
    }

    /* glow */
    .glow{
      position:absolute;
      width:700px;
      height:700px;
      background:
      radial-gradient(circle,
      rgba(0,255,200,0.13),
      transparent 70%);
      filter:blur(40px);
      animation:pulseGlow 5s infinite ease-in-out;
    }

    @keyframes pulseGlow{
      0%,100%{
        transform:scale(1);
        opacity:0.6;
      }

      50%{
        transform:scale(1.12);
        opacity:1;
      }
    }

    /* scanlines */
    .scanlines{
      position:absolute;
      inset:0;

      background:
      repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 3px
      );

      pointer-events:none;
      z-index:10;
    }

    /* particles */
    .particles span{
      position:absolute;
      width:2px;
      height:2px;
      background:#00ffcc;
      border-radius:50%;
      opacity:0.4;
      animation:float linear infinite;
    }

    @keyframes float{
      from{
        transform:translateY(100vh);
      }

      to{
        transform:translateY(-10vh);
      }
    }

    .container{
      position:relative;
      z-index:20;
      width:90%;
      max-width:900px;
    }

    /* boot sequence */
    .boot{
      font-size:18px;
      line-height:1.9;
      opacity:0.9;
      margin-bottom:30px;
    }

    .boot-line{
      opacity:0;
      animation:showLine 0.5s forwards;
    }

    @keyframes showLine{
      to{
        opacity:1;
      }
    }

    /* main message */
    .main-message{
      font-size:23px;
      line-height:1.8;
      position:relative;

      text-shadow:
      0 0 5px rgba(0,255,200,0.5),
      0 0 20px rgba(0,255,200,0.2);

      opacity:0;
      transform:translateY(10px);

      transition:1s ease;
    }

    .main-message.active{
      opacity:1;
      transform:translateY(0);
    }

    .cursor{
      animation:blink 0.8s infinite;
    }

    @keyframes blink{
      50%{
        opacity:0;
      }
    }

    /* glitch burst */
    .glitching{
      animation:glitchFlash 0.15s infinite;
    }

    @keyframes glitchFlash{
      0%{
        transform:translate(0);
      }

      25%{
        transform:translate(-2px,1px);
      }

      50%{
        transform:translate(2px,-1px);
      }

      75%{
        transform:translate(-1px,-1px);
      }

      100%{
        transform:translate(0);
      }
    }

    /* bottom code */
    .bottom-code{
      position:absolute;
      bottom:35px;
      width:100%;
      text-align:center;

      font-size:18px;
      letter-spacing:6px;
      opacity:0.6;

      text-shadow:
      0 0 10px rgba(0,255,200,0.35);

      z-index:30;
    }

    /* terminal tag */
    .tag{
      margin-top:18px;
      font-size:11px;
      letter-spacing:4px;
      opacity:0.45;
    }

  </style>
</head>

<body>

  <div class="glow"></div>

  <div class="particles">
    <span style="left:10%; animation-duration:10s;"></span>
    <span style="left:20%; animation-duration:14s;"></span>
    <span style="left:35%; animation-duration:11s;"></span>
    <span style="left:50%; animation-duration:13s;"></span>
    <span style="left:65%; animation-duration:9s;"></span>
    <span style="left:80%; animation-duration:15s;"></span>
    <span style="left:90%; animation-duration:12s;"></span>
  </div>

  <div class="scanlines"></div>

  <div class="container">

    <div class="boot" id="boot"></div>

    <div class="main-message" id="mainMessage">
      <span id="decrypt"></span><span class="cursor">_</span>

      <div class="tag">
        // encrypted signal stable //
      </div>
    </div>

  </div>

  <div class="bottom-code">
    %@**#& #^*!+
  </div>

  <script>

    /* boot sequence */
    const bootLines = [
      "INITIALIZING VOIDCIPHER...",
      "ROUTING SIGNAL THROUGH NODE...",
      "VERIFYING MEMORY CACHE...",
      "DECRYPTION ENGINE ACTIVE...",
      "SIGNAL RECOVERED",
      "ACCESS GRANTED"
    ];

    const bootContainer = document.getElementById("boot");

    let bootIndex = 0;

    function showBootLine(){

      if(bootIndex < bootLines.length){

        const line = document.createElement("div");

        line.classList.add("boot-line");

        line.textContent = "> " + bootLines[bootIndex];

        bootContainer.appendChild(line);

        bootIndex++;

        setTimeout(showBootLine, 700);

      }else{

        setTimeout(startDecrypt, 1200);

      }

    }

    showBootLine();

    /* decrypt text */
    const finalText =
    ":::::::::>... Parents are only strict when they know their product is attractive";

    const chars =
    "ABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890@#$%&*!";

    const decryptEl = document.getElementById("decrypt");

    const mainMessage = document.getElementById("mainMessage");

    function randomChar(){
      return chars[Math.floor(Math.random() * chars.length)];
    }

    function startDecrypt(){

      mainMessage.classList.add("active");

      let iteration = 0;

      const interval = setInterval(() => {

        decryptEl.innerText =
        finalText
        .split("")
        .map((letter,index) => {

          if(index < iteration){
            return finalText[index];
          }

          if(letter === " "){
            return " ";
          }

          return randomChar();

        })
        .join("");

        iteration += 1 / 2;

        if(iteration >= finalText.length){

          clearInterval(interval);

          decryptEl.innerText = finalText;

          randomGlitch();

        }

      },35);

    }

    /* random glitch bursts */
    function randomGlitch(){

      setInterval(() => {

        mainMessage.classList.add("glitching");

        setTimeout(() => {

          mainMessage.classList.remove("glitching");

        },150);

      },5000);

    }

  </script>

</body>
</html>
